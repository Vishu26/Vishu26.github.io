<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Views — Srikumar Sastry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="../images/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="../stylesheet.css">
    <style>
      #map-frame {
        width: 100%;
        height: 600px;
        max-width: 800px;
        margin: 20px auto;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      .views-badge {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: rgba(255,255,255,0.95);
        padding: 10px 20px;
        border-radius: 8px;
        font-family: 'Lato', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: #1772d0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        border: 1px solid #e0e0e0;
      }
      .map-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .page-title {
        text-align: center;
        margin-top: 24px;
        margin-bottom: 8px;
      }
      .back-link {
        text-align: center;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <table style="width:100%;max-width:800px;border:0;border-spacing:0;margin-right:auto;margin-left:auto;"><tbody>
      <tr>
        <td style="padding:20px">
          <p class="page-title" style="font-size:1.5rem;">Views counter</p>
          <p class="back-link"><a href="../index.html">← Back to home</a></p>
          <div class="map-container">
            <div id="views-badge" class="views-badge" aria-live="polite">Global city-level views map</div>
            <iframe
              id="map-frame"
              title="City-level views map"
              src="https://www.mapmyuser.com/site/vishu26.github.io"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </td>
      </tr>
    </tbody></table>
  </body>
</html>
