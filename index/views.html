<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Views — Srikumar Sastry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="../images/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="../stylesheet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <style>
      #map {
        width: 100%;
        height: 400px;
        max-width: 800px;
        margin: 20px auto;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      .views-badge {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: rgba(255,255,255,0.95);
        padding: 10px 20px;
        border-radius: 8px;
        font-family: 'Lato', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: #1772d0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        border: 1px solid #e0e0e0;
      }
      .map-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .page-title {
        text-align: center;
        margin-top: 24px;
        margin-bottom: 8px;
      }
      .back-link {
        text-align: center;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <table style="width:100%;max-width:800px;border:0;border-spacing:0;margin-right:auto;margin-left:auto;"><tbody>
      <tr>
        <td style="padding:20px">
          <p class="page-title" style="font-size:1.5rem;">Views counter</p>
          <p class="back-link"><a href="../index.html">← Back to home</a></p>
          <div class="map-container">
            <div id="views-badge" class="views-badge" aria-live="polite">Loading…</div>
            <div id="map"></div>
          </div>
        </td>
      </tr>
    </tbody></table>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      (function () {
        var MAP_CENTER = [20, 0];
        var MAP_ZOOM = 2;
        var POINTS_KEY = 'homepage_view_points';

        var map = L.map('map').setView(MAP_CENTER, MAP_ZOOM);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        var badge = document.getElementById('views-badge');

        function safePoints() {
          var raw = localStorage.getItem(POINTS_KEY);
          if (!raw) return [];
          try {
            var parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) return [];
            return parsed.filter(function (p) {
              return p && Number.isFinite(Number(p.lat)) && Number.isFinite(Number(p.lng));
            });
          } catch (e) {
            return [];
          }
        }

        function aggregateByCoordinate(points) {
          var buckets = {};
          points.forEach(function (p) {
            var lat = Number(p.lat);
            var lng = Number(p.lng);
            var key = lat.toFixed(3) + ',' + lng.toFixed(3);
            if (!buckets[key]) {
              buckets[key] = {
                lat: lat,
                lng: lng,
                count: 0,
                city: p.city || 'Unknown city',
                country: p.country || 'Unknown country'
              };
            }
            buckets[key].count += 1;
          });
          return Object.keys(buckets).map(function (k) { return buckets[k]; });
        }

        function setBadge(totalViews, locationCount) {
          badge.textContent = totalViews + ' total views across ' + locationCount + ' location' + (locationCount === 1 ? '' : 's');
        }

        function addMarker(point) {
          var views = point.count;
          var radius = Math.min(24, 5 + Math.log(views + 1) * 2.5);
          L.circleMarker([point.lat, point.lng], {
            radius: radius,
            color: '#0d47a1',
            weight: 1,
            fillColor: '#1772d0',
            fillOpacity: 0.65
          }).addTo(map).bindPopup(point.city + ', ' + point.country + ': ' + views + ' view' + (views === 1 ? '' : 's'));
        }

        var points = safePoints();
        var grouped = aggregateByCoordinate(points);

        if (grouped.length === 0) {
          badge.textContent = '0 total views';
          return;
        }

        grouped.forEach(addMarker);
        setBadge(points.length, grouped.length);

        var bounds = L.latLngBounds(grouped.map(function (p) { return [p.lat, p.lng]; }));
        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [24, 24] });
        }
      })();
    </script>
  </body>
</html>
