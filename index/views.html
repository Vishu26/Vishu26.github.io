<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Views — Srikumar Sastry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="../images/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="../stylesheet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <style>
      #map {
        width: 100%;
        height: 600px;
        max-width: 800px;
        margin: 20px auto;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      .views-badge {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: rgba(255,255,255,0.95);
        padding: 10px 20px;
        border-radius: 8px;
        font-family: 'Lato', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: #1772d0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        border: 1px solid #e0e0e0;
      }
      .map-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .page-title {
        text-align: center;
        margin-top: 24px;
        margin-bottom: 8px;
      }
      .back-link {
        text-align: center;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <table style="width:100%;max-width:800px;border:0;border-spacing:0;margin-right:auto;margin-left:auto;"><tbody>
      <tr>
        <td style="padding:20px">
          <p class="page-title" style="font-size:1.5rem;">Views counter</p>
          <p class="back-link"><a href="../index.html">← Back to home</a></p>
          <div class="map-container">
            <div id="views-badge" class="views-badge" aria-live="polite">Loading global city-level views...</div>
            <div id="map"></div>
          </div>
        </td>
      </tr>
    </tbody></table>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      (function () {
        var SUPABASE_URL = 'https://aapiijouiukvfqxsqdsc.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhcGlpam91aXVrdmZxeHNxZHNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3ODE0MzUsImV4cCI6MjA4NzM1NzQzNX0.qgpdNwMVSfX9W1gP-ZLj-2_YnNxskcC8Q9nM0K-CEGk';
        var SELECT_URL = SUPABASE_URL + '/rest/v1/view_points?select=city,country,lat,lng&limit=5000';
        var badge = document.getElementById('views-badge');
        var map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        function addMarker(entry) {
          var count = parseInt(entry.count, 10) || 0;
          if (!Number.isFinite(entry.lat) || !Number.isFinite(entry.lng) || count <= 0) return null;
          var radius = Math.min(24, 5 + Math.log(count + 1) * 2.5);
          return L.circleMarker([entry.lat, entry.lng], {
            radius: radius,
            color: '#0d47a1',
            weight: 1,
            fillColor: '#1772d0',
            fillOpacity: 0.65
          }).addTo(map).bindPopup(entry.city + ', ' + entry.country + ': ' + count + ' view' + (count === 1 ? '' : 's'));
        }

        function renderFromPointArray(rawPoints) {
          var grouped = {};
          (Array.isArray(rawPoints) ? rawPoints : []).forEach(function (p) {
            var lat = Number(p && p.lat);
            var lng = Number(p && p.lng);
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
            var city = p.city || 'Unknown city';
            var country = p.country || 'Unknown country';
            var key = city + '|' + country;
            if (!grouped[key]) {
              grouped[key] = { city: city, country: country, lat: lat, lng: lng, count: 0 };
            }
            grouped[key].count += 1;
          });

          var points = Object.keys(grouped).map(function (k) { return grouped[k]; });
          var total = points.reduce(function (acc, p) { return acc + (parseInt(p.count, 10) || 0); }, 0);
          var markers = points.map(addMarker).filter(Boolean);
          badge.textContent = total + ' total views across ' + markers.length + ' cit' + (markers.length === 1 ? 'y' : 'ies');
          if (markers.length === 0) return;
          var bounds = L.latLngBounds(points.map(function (p) { return [p.lat, p.lng]; }));
          if (bounds.isValid()) map.fitBounds(bounds, { padding: [24, 24] });
        }

        fetch(SELECT_URL, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
          }
        })
          .then(function (r) {
            if (!r.ok) throw new Error('Supabase query failed');
            return r.json();
          })
          .then(function (rows) {
            renderFromPointArray(rows);
          })
          .catch(function () {
            badge.textContent = 'Unable to load aggregated global views';
          });
      })();
    </script>
  </body>
</html>
